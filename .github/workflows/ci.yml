name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No build step and no dependencies — just verify every script parses.
      - run: npm run check
