name: Deploy to GitHub Pages

# Publishes the static site on every push to main.
# Enable once under: repo → Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run so no manual Settings toggle is needed.
          # (If your org restricts token-based enablement, set Settings → Pages →
          #  Source → "GitHub Actions" once instead.)
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # The site is static and lives at the repo root (index.html).
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
