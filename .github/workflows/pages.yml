name: Deploy to GitHub Pages

# Publishes the static site on every push to main.
# Enable once under: repo → Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ONE-TIME SETUP: enable Pages first, or this step fails with
      # "Resource not accessible by integration" — the Actions token can deploy
      # to an existing Pages site but cannot create one.
      # Repo → Settings → Pages → Build and deployment → Source → "GitHub Actions".
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # The site is static and lives at the repo root (index.html).
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
